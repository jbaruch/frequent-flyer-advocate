name: Publish Tile

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tesslio/publish@main
        with:
          token: ${{ secrets.TESSL_API_TOKEN }}

  eval:
    needs: publish
    runs-on: ubuntu-latest
    env:
      TESSL_API_TOKEN: ${{ secrets.TESSL_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install tessl CLI
        run: curl -fsSL https://get.tessl.io | sh
      - name: Verify auth
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tessl whoami
      - name: Run evals
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tessl eval run . --json | tee eval-results.json
      - name: Wait for eval results
        if: always()
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          EVAL_ID=$(grep -o '"id":"[^"]*"' eval-results.json 2>/dev/null | head -1 | cut -d'"' -f4)
          if [ -z "$EVAL_ID" ]; then
            echo "No eval ID found, skipping results check"
            exit 0
          fi
          echo "Eval run: https://tessl.io/eval-runs/$EVAL_ID"
          for i in $(seq 1 40); do
            STATUS=$(tessl eval view "$EVAL_ID" --json 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4) || true
            echo "Status: ${STATUS:-unknown} (attempt $i/40)"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              tessl eval view "$EVAL_ID"
              break
            fi
            sleep 30
          done
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.json
